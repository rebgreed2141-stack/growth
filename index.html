<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>身長体重管理</title>
  <meta name="theme-color" content="#4CAF50" />
  <link rel="manifest" href="./manifest.json" />
  <link rel="stylesheet" href="./styles.css" />

  <style>
    .app-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .app-title-block {
      display: flex;
      flex-direction: column;
    }

    .app-version {
      font-size: 0.9rem;
      color: #6b7c8f;
      font-weight: 600;
    }
  </style>
</head>

<body>
  <div class="app-shell">
    <header class="app-header">
      <div class="app-title-block">
        <h1>園児 身長＆体重 管理</h1>
        <p id="headerNote" class="header-note">
          入力すると同じ月の古いデータは自動で置き換わります。
        </p>
      </div>

      <!-- ★ 右端固定 -->
      <div class="app-version">Ver 1.0.0</div>
    </header>

    <main class="main-layout">

      <section id="inputView" class="panel view active">
        <div class="card">
          <div class="form-grid">
            <label class="field">
              <span>クラス</span>
              <select id="classSelect"></select>
            </label>

            <label class="field">
              <span>園児</span>
              <select id="childSelect"></select>
            </label>

            <label class="field">
              <span>日付</span>
              <input id="dateInput" type="date" />
            </label>

            <div class="field field-spacer"></div>

            <label class="field">
              <span>身長（cm）</span>
              <input id="heightInput" type="number" step="0.1" />
            </label>

            <label class="field">
              <span>体重（kg）</span>
              <input id="weightInput" type="number" step="0.1" />
            </label>
          </div>

          <div id="modeView" class="mode-view">新規登録</div>

          <div class="button-grid main-buttons">
            <button id="saveBtn" class="btn primary">登録 / 更新</button>
            <button id="clearBtn" class="btn">クリア</button>
            <button id="openReportBtn" class="btn">グラフ＆一覧</button>
            <button id="openManageBtn" class="btn">管理</button>
          </div>

          <div id="statusLine" class="status-line"></div>
        </div>
      </section>

      <section id="reportView" class="panel view">
        <div class="card">
          <div class="report-head">
            <div>
              <h2 id="reportTitle">グラフ＆一覧</h2>
              <p id="chartNote" class="sub-note"></p>
            </div>
            <div class="button-row">
              <button id="backFromReportBtn" class="btn">戻る</button>
            </div>
          </div>

          <div class="chart-box">
            <canvas id="chart"></canvas>
          </div>

          <h3 class="section-title">この園児の一覧</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>月</th>
                  <th>日付</th>
                  <th>身長(cm)</th>
                  <th>体重(kg)</th>
                  <th>操作</th>
                </tr>
              </thead>
              <tbody id="dataTbody"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section id="manageView" class="panel view">
        <div class="card">
          <div class="report-head">
            <div>
              <h2>管理</h2>
              <p class="sub-note">バックアップ、復元、削除を行います。</p>
            </div>
            <div class="button-row">
              <button id="backFromManageBtn" class="btn">戻る</button>
            </div>
          </div>

          <div class="manage-grid">
            <button id="backupBtn" class="btn primary">バックアップ</button>

            <div class="restore-block">
              <button id="restoreBtn" class="btn">データ復元</button>
              <input id="restoreFile" type="file" accept=".zip" hidden />
            </div>

            <button id="deleteAllBtn" class="btn danger">データ削除</button>
          </div>

          <div id="manageStatus" class="status-line"></div>
        </div>
      </section>

    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script src="./jszip.min.js"></script>
  <script src="./app.js"></script>
</body>
</html>
